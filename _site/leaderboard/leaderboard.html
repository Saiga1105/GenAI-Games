<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Games</title>
    <meta name="description" content="A playful, high-energy research event where PhD researchers from four construction-related research groups compete in mixed teams to solve short challenges using generative AI.">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .logo {
            max-width: 300px;
            height: auto;
            margin-bottom: 20px;
        }

        .register-btn {
            display: inline-block;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 18px;
            margin: 20px 0;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .content-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        h1, h2, h3 {
            color: #2c3e50;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h2 {
            font-size: 2em;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 1.5em;
            color: #34495e;
        }

        p {
            margin-bottom: 15px;
        }

        ul, ol {
            margin-left: 20px;
            margin-bottom: 20px;
        }

        li {
            margin-bottom: 10px;
        }

        .event-details {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .event-details h3 {
            color: white;
            border-bottom: 2px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 5px;
        }

        .research-groups {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin: 20px 0;
        }

        .group-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .group-card h4 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .media-section {
            text-align: center;
            margin: 30px 0;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .media-item {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .media-item img, .media-item video {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .media-item h4 {
            margin: 10px 0;
            color: #2c3e50;
        }

        .key-message {
            background: linear-gradient(45deg, #4ECDC4, #44a08d);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            margin: 30px 0;
        }

        .key-message h3 {
            color: white;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .container {
                padding: 10px;
            }

            .hero {
                padding: 20px;
            }

            h1 {
                font-size: 2em;
            }

            .research-groups {
                grid-template-columns: 1fr;
            }

            .media-grid {
                grid-template-columns: 1fr;
            }
        }

        .nav-bar {
            text-align: center;
            margin-bottom: 20px;
        }

        .nav-btn {
            display: inline-block;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
            margin: 0 10px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .leaderboard-table table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        .leaderboard-table th, .leaderboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .leaderboard-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .assignments-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .assignments-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .card-image {
            height: 140px;
            width: auto;
            object-fit: contain;
            margin-bottom: 15px;
        }

        .card h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        .card p {
            margin-bottom: 20px;
            color: #555;
        }

        .card-buttons {
            display: flex;
            justify-content: space-around;
            gap: 10px;
        }

        .download-btn, .submit-btn {
            display: inline-block;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 14px;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .download-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .submit-btn {
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
    <a href="../index.html" class="nav-btn">Home</a>
    <a href="../tasks/tasks.html" class="nav-btn">Tasks</a>
    <a href="leaderboard.html" class="nav-btn">Leaderboard</a>
</div>

<div class="content-section">
    <h2>Scoreboard</h2>
    <p>This page reads live score data from the Google Sheet backend.</p>
    <p><a href="https://docs.google.com/spreadsheets/d/16dZPzUlW7fY6nvecKZnOQiqAmT8yvJUDH0q6_0qD0gU/edit" target="_blank" rel="noopener noreferrer" class="download-btn">Open Score Sheet</a></p>
    <div id="scoreboard-status">Loading scoreboard...</div>
    <div id="scoreboard-content" style="display: none;"></div>
</div>

<script>
    (function () {
        const sheetId = "16dZPzUlW7fY6nvecKZnOQiqAmT8yvJUDH0q6_0qD0gU";
        const statusEl = document.getElementById("scoreboard-status");
        const contentEl = document.getElementById("scoreboard-content");
        const sheetsData = {};
        const requiredSheets = ["Teams", "Tasks", "Scores"];

        function escapeHtml(value) {
            return String(value ?? "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function gvizToObjects(response) {
            const cols = response.table.cols.map(col => col.label || col.id || "");
            return response.table.rows.map(row => {
                const item = {};
                cols.forEach((col, index) => {
                    item[col] = row.c[index] ? row.c[index].v : "";
                });
                return item;
            });
        }

        function maybeRender() {
            if (!requiredSheets.every(name => Array.isArray(sheetsData[name]))) {
                return;
            }

            const teams = sheetsData.Teams
                .map(team => ({
                    name: team.team,
                    total: Number(team.total || 0)
                }))
                .filter(team => team.name)
                .sort((a, b) => b.total - a.total);

            const tasks = sheetsData.Tasks
                .map(task => ({
                    id: task.task_id,
                    name: task.task_name,
                    winner: task.winner
                }))
                .filter(task => task.id && task.name);

            const scores = sheetsData.Scores
                .map(score => ({
                    task_id: score.task_id,
                    team: score.team,
                    workflow: Number(score.workflow || 0),
                    correctness: Number(score.correctness || 0),
                    visuals: Number(score.visuals || 0),
                    verification: Number(score.verification || 0),
                    total: Number(score.total || 0)
                }))
                .filter(score => score.task_id && score.team);

            if (!teams.length) {
                statusEl.textContent = "The score sheet is reachable, but it does not contain team data yet.";
                return;
            }

            const leader = teams[0];
            const teamsTable = teams.map((team, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${escapeHtml(team.name)}</strong></td>
                    <td>${team.total}</td>
                </tr>
            `).join("");

            const taskSections = tasks.map(task => {
                const taskScores = scores
                    .filter(score => score.task_id === task.id)
                    .sort((a, b) => b.total - a.total);

                const rows = taskScores.map((score, index) => `
                    <tr>
                        <td>${index + 1}</td>
                        <td><strong>${escapeHtml(score.team)}</strong></td>
                        <td>${score.workflow}</td>
                        <td>${score.correctness}</td>
                        <td>${score.visuals}</td>
                        <td>${score.verification}</td>
                        <td>${score.total}</td>
                    </tr>
                `).join("");

                return `
                    <div style="margin-top: 28px; padding-top: 24px; border-top: 1px solid #e1e7ef;">
                        <div style="display: flex; justify-content: space-between; align-items: baseline; gap: 16px; flex-wrap: wrap; margin-bottom: 14px;">
                            <h4 style="margin: 0;">${escapeHtml(task.name)}</h4>
                            <p style="margin: 0;"><strong>Winner:</strong> ${escapeHtml(task.winner || (taskScores[0] ? taskScores[0].team : ""))}</p>
                        </div>
                        <div class="leaderboard-table">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Place</th>
                                        <th>Team</th>
                                        <th>Workflow</th>
                                        <th>Correctness</th>
                                        <th>Visuals</th>
                                        <th>Verification</th>
                                        <th>Total</th>
                                    </tr>
                                </thead>
                                <tbody>${rows}</tbody>
                            </table>
                        </div>
                    </div>
                `;
            }).join("");

            contentEl.innerHTML = `
                <div style="margin-top: 24px; padding: 24px; border-radius: 16px; background: linear-gradient(135deg, #fff7d6, #ffe8a3); border: 1px solid #f0d980;">
                    <h3 style="margin-bottom: 8px;">Current Leader</h3>
                    <p style="font-size: 2rem; font-weight: bold; margin-bottom: 4px;">${escapeHtml(leader.name)}</p>
                    <p style="margin: 0; color: #5b4a00;">${leader.total} total points</p>
                </div>
                <div class="content-section" style="margin-top: 20px;">
                    <h3>Total Score Per Team</h3>
                    <div class="leaderboard-table">
                        <table>
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>Team</th>
                                    <th>Total Points</th>
                                </tr>
                            </thead>
                            <tbody>${teamsTable}</tbody>
                        </table>
                    </div>
                </div>
                <div class="content-section" style="margin-top: 20px;">
                    <h3>Points Per Team Per Task</h3>
                    <p>Each task is graded on workflow, correctness, visuals, and verification.</p>
                    ${taskSections}
                </div>
            `;

            statusEl.style.display = "none";
            contentEl.style.display = "block";
        }

        function handleFailure() {
            statusEl.innerHTML = "The scoreboard could not be loaded from Google Sheets. Make sure the sheet is shared so the website can read it.";
        }

        function addSheetLoader(sheetName, callbackName) {
            const script = document.createElement("script");
            script.src = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?sheet=${encodeURIComponent(sheetName)}&headers=1&tqx=responseHandler:${callbackName}`;
            script.onerror = handleFailure;
            document.head.appendChild(script);
        }

        window.handleTeamsSheet = function (response) {
            sheetsData.Teams = gvizToObjects(response);
            maybeRender();
        };

        window.handleTasksSheet = function (response) {
            sheetsData.Tasks = gvizToObjects(response);
            maybeRender();
        };

        window.handleScoresSheet = function (response) {
            sheetsData.Scores = gvizToObjects(response);
            maybeRender();
        };

        addSheetLoader("Teams", "handleTeamsSheet");
        addSheetLoader("Tasks", "handleTasksSheet");
        addSheetLoader("Scores", "handleScoresSheet");
    })();
</script>


    </div>
</body>
</html>
